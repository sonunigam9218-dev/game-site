<!DOCTYPE html>
<html>
<head>
<title>Sonu Color Prediction</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.header{
background:#111;
padding:15px;
font-size:22px;
}

.balance{
margin-top:5px;
font-size:18px;
}

.timer{
font-size:28px;
color:#ff5252;
margin:20px;
}

.menu button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
}

.deposit{background:#4caf50;}
.withdraw{background:#ff9800;}

.bet button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#ffc107;
}

.colors button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
}

.red{background:red;}
.green{background:green;}
.blue{background:blue;}

.history{
margin-top:20px;
padding:10px;
}

.history span{
background:white;
color:black;
padding:5px 8px;
margin:3px;
display:inline-block;
border-radius:5px;
}

.popup{
display:none;
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">
🎮 Sonu Color Prediction
<div class="balance">Balance ₹<span id="balance">1000</span></div>
</div>

<div class="timer">
⏱ Time: <span id="time">30</span>
</div>

<div class="menu">
<button class="deposit" onclick="showDeposit()">Deposit</button>
<button class="withdraw" onclick="showWithdraw()">Withdraw</button>
</div>

<h3>Select Bet</h3>

<div class="bet">
<button onclick="bet=10">₹10</button>
<button onclick="bet=50">₹50</button>
<button onclick="bet=100">₹100</button>
</div>

<h3>Choose Color</h3>

<div class="colors">
<button class="red" onclick="choose('Red')">Red</button>
<button class="green" onclick="choose('Green')">Green</button>
<button class="blue" onclick="choose('Blue')">Blue</button>
</div>

<h3>Game History</h3>

<div class="history" id="history"></div>

<div class="popup" id="depositBox">
<h3>Deposit</h3>
<p>UPI: Mahiraswaraj09@ybl</p>
<button onclick="closeBox()">Close</button>
</div>

<div class="popup" id="withdrawBox">
<h3>Withdraw</h3>
<input placeholder="Enter Amount">
<br><br>
<button onclick="closeBox()">Submit</button>
</div>

<script>

let balance=1000
let bet=10
let selectColor=""
let history=[]
let round=100
let time=30

function choose(color){
selectColor=color
}

function result(){

let colors=["Red","Green","Blue"]

let res=colors[Math.floor(Math.random()*3)]

round++

history.unshift(round+"-"+res)

if(history.length>10){
history.pop()
}

if(selectColor===res){
balance+=bet*2
}else{
balance-=bet
}

document.getElementById("balance").innerHTML=balance

let h=""

history.forEach(function(x){
h+="<span>"+x+"</span>"
})

document.getElementById("history").innerHTML=h

}

setInterval(function(){

time--

if(time<=0){

result()

time=30

}

document.getElementById("time").innerHTML=time

},1000)

function showDeposit(){
document.getElementById("depositBox").style.display="block"
}

function showWithdraw(){
document.getElementById("withdrawBox").style.display="block"
}

function closeBox(){
document.getElementById("depositBox").style.display="none"
document.getElementById("withdrawBox").style.display="none"
}

</script>

</body>
</html>
